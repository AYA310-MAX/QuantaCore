<!DOCTYPE html>
<html>
<head>
    <title>QuantaCore</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash-screen">
    <div class="crescent-container">
        <div class="crescent left"></div>
        <div class="crescent right"></div>
    </div>
    <h1 class="splash-title">QUANTACORE</h1>
</div>

<!-- MAIN APP -->
<div id="main-app" class="hidden">

    <div class="hero-section">

        <div class="core-container">
            <div class="aura" id="aura"></div>

            <div class="face" id="face">
                <div class="eyes">
                    <div class="eye left-eye"></div>
                    <div class="eye right-eye"></div>
                </div>
            </div>
        </div>

        <div class="system-panel">
            <h2>AyAstra</h2>

            <div id="chat-box"></div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Speak to QuantaCore..." />
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
